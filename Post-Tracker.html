<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Post-Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --card: #ffffff;
    --border: #e8e6e1;
    --border-soft: #f0ede8;

    --text: #1a1916;
    --text-mid: #7a7672;
    --text-dim: #b0ada8;

    --approved-bg: #1a1916;
    --approved-text: #ffffff;
    --approved-card: #f7f6f4;
    --approved-dot: #1a1916;

    --waiting-bg: #fff8ee;
    --waiting-text: #c07a20;
    --waiting-border: #f0d0a0;
    --waiting-card: #fffcf7;
    --waiting-dot: #e09040;

    --pending-dot: #d8d5d0;

    /* Session highlight */
    --session-glow: #1a1916;
    --session-card: #fffff8;
    --session-border: #1a1916;

    --r: 16px;
    --r-sm: 10px;
    --r-full: 100px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', 'Sarabun', sans-serif;
    min-height: 100vh;
    padding-bottom: 140px;
    font-weight: 400;
  }

  /* ─── HEADER ─── */
  .header {
    background: var(--bg);
    padding: 32px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .brand { display: flex; flex-direction: column; gap: 2px; }
  .brand-sub { font-size: 11px; font-weight: 500; color: var(--text-dim); letter-spacing: 0.5px; }
  .brand-title { font-size: 26px; font-weight: 400; color: var(--text); line-height: 1.1; }

  .reset-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text-mid);
    padding: 8px 16px;
    border-radius: var(--r-full);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:active { background: var(--border); }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .progress-meta .label { font-size: 12px; font-weight: 500; color: var(--text-dim); }
  .progress-meta .count { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); }

  .progress-track {
    background: var(--border);
    height: 6px;
    width: 100%;
    border-radius: var(--r-full);
    overflow: hidden;
  }
  .progress-fill {
    height: 6px;
    background: var(--text);
    border-radius: var(--r-full);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* ─── SESSION BANNER ─── */
  .session-banner {
    background: var(--text);
    color: #fff;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.3px;
    display: none;
  }
  .session-banner.active { display: flex; }
  .session-banner .session-info { display: flex; align-items: center; gap: 8px; }
  .session-pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: #fff;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  .session-stop-btn {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    padding: 5px 12px;
    border-radius: var(--r-full);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
  }

  /* ─── CONTENT ─── */
  .content { padding: 16px; max-width: 480px; margin: 0 auto; }

  .post-card {
    background: var(--surface);
    border-radius: var(--r);
    padding: 20px;
    margin-bottom: 16px;
    border: 1.5px solid var(--border);
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .post-textarea {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.7;
    padding: 12px 14px;
    resize: none;
    min-height: 90px;
    outline: none;
    transition: border-color 0.2s;
  }
  .post-textarea:focus { border-color: var(--text); }
  .post-textarea::placeholder { color: var(--text-dim); }

  .copy-btn {
    margin-top: 12px;
    background: var(--text);
    border: none;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 13px 20px;
    width: 100%;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: var(--r-sm);
  }
  .copy-btn:active { opacity: 0.8; transform: scale(0.99); }
  .copy-btn.copied { background: #3a7d52; }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0 14px;
  }
  .section-divider .line { flex: 1; height: 1px; background: var(--border); }
  .section-divider .label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ─── TOOLBAR ROW ─── */
  .toolbar-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
  }

  /* Session button */
  .session-btn {
    padding: 9px 14px;
    background: var(--text);
    border: none;
    color: #fff;
    border-radius: var(--r-full);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .session-btn:active { opacity: 0.8; transform: scale(0.97); }
  .session-btn.session-active {
    background: #3a7d52;
  }

  /* Multi-select button */
  .multiselect-btn {
    padding: 9px 14px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text-mid);
    border-radius: var(--r-full);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .multiselect-btn:active { transform: scale(0.97); }
  .multiselect-btn.ms-active {
    background: var(--text);
    border-color: var(--text);
    color: #fff;
    font-weight: 600;
  }

  /* ─── BULK ACTION BAR ─── */
  .bulk-bar {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    padding: 12px 14px;
    margin-bottom: 10px;
    display: none;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .bulk-bar.visible { display: flex; }

  .bulk-count {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-mid);
    flex: 1;
  }

  .bulk-action-btn {
    padding: 8px 14px;
    border-radius: var(--r-full);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.2s;
  }
  .bulk-action-btn:active { opacity: 0.7; }

  .bulk-btn-done {
    background: var(--approved-bg);
    color: #fff;
    border-color: var(--approved-bg);
  }
  .bulk-btn-wait {
    background: var(--waiting-bg);
    color: var(--waiting-text);
    border-color: var(--waiting-border);
  }
  .bulk-btn-reset {
    background: var(--bg);
    color: var(--text-mid);
    border-color: var(--border);
  }
  .bulk-select-all-btn {
    background: transparent;
    color: var(--text-mid);
    border-color: var(--border);
    font-weight: 500;
  }

  /* ─── FILTER TABS ─── */
  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex: 1;
  }

  .filter-tab {
    flex: 1;
    padding: 10px 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r-full);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .filter-tab:active { transform: scale(0.97); }

  .filter-tab.tab-all.active { background: var(--text); border-color: var(--text); color: #fff; }
  .filter-tab.tab-approved.active { background: var(--text); border-color: var(--text); color: #fff; }
  .filter-tab.tab-waiting.active { background: var(--waiting-bg); border-color: var(--waiting-border); color: var(--waiting-text); }

  .tab-count { font-size: 12px; font-weight: 600; opacity: 0.7; }

  /* ─── GROUP ITEM ─── */
  .group-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.3s;
    user-select: none;
  }

  .group-item.status-done { background: var(--approved-card); border-color: var(--border); }
  .group-item.status-waiting { background: var(--waiting-card); border-color: var(--waiting-border); }

  /* Session highlight — next pending group */
  .group-item.session-next {
    border-color: var(--session-border);
    border-width: 2px;
    box-shadow: 0 0 0 3px rgba(26,25,22,0.08);
    background: var(--session-card);
  }

  /* Multi-select selected */
  .group-item.ms-selected {
    border-color: var(--text);
    border-width: 2px;
    background: #f0ede8;
  }

  .group-main {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
  }

  /* Checkbox (multi-select mode) */
  .ms-checkbox {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    display: none;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 11px;
    color: #fff;
    font-weight: 700;
  }
  .ms-mode .ms-checkbox { display: flex; }
  .group-item.ms-selected .ms-checkbox {
    background: var(--text);
    border-color: var(--text);
  }

  /* Session badge on next item */
  .session-badge {
    display: none;
    font-size: 10px;
    font-weight: 700;
    color: var(--text);
    background: #fff;
    border: 1.5px solid var(--text);
    padding: 2px 8px;
    border-radius: var(--r-full);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .group-item.session-next .session-badge { display: block; }

  .status-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: all 0.25s;
  }
  .status-pending .status-dot { background: var(--pending-dot); }
  .status-done .status-dot { background: var(--approved-dot); }
  .status-waiting .status-dot { background: var(--waiting-dot); }

  .group-info { flex: 1; min-width: 0; }
  .group-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    transition: color 0.2s;
  }
  .status-done .group-name { color: var(--text-dim); text-decoration: line-through; text-decoration-color: var(--text-dim); }
  .status-waiting .group-name { color: var(--waiting-text); }
  .session-next .group-name { font-weight: 600; }

  .group-note { font-size: 11px; color: #c07a20; margin-top: 2px; font-style: italic; }

  .group-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: var(--r-full);
    flex-shrink: 0;
  }
  .status-pending .group-badge { color: var(--text-dim); background: var(--bg); border: 1.5px solid var(--border); }
  .status-done .group-badge { color: #fff; background: var(--approved-dot); border: 1.5px solid var(--approved-dot); }
  .status-waiting .group-badge { color: var(--waiting-text); background: var(--waiting-bg); border: 1.5px solid var(--waiting-border); }

  /* Action buttons row */
  .group-actions {
    display: flex;
    border-top: 1.5px solid var(--border-soft);
    padding: 6px 8px;
    gap: 6px;
  }
  .status-waiting .group-actions { border-color: var(--waiting-border); }

  .group-action-btn {
    flex: 1;
    padding: 9px 4px;
    background: transparent;
    border: 1.5px solid transparent;
    border-radius: var(--r-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-mid);
  }
  .group-action-btn:active { opacity: 0.6; }

  /* One-tap Post & Mark button */
  .group-action-btn.btn-post-mark {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.2px;
  }
  .group-action-btn.btn-post-mark:active { opacity: 0.75; transform: scale(0.98); }

  .group-action-btn.btn-wait { color: var(--text-mid); }
  .group-action-btn.btn-wait.active-wait { background: var(--waiting-bg); color: var(--waiting-text); border-color: var(--waiting-border); font-weight: 600; }
  .group-action-btn.btn-delete-item { color: var(--text-dim); }
  .group-action-btn.btn-delete-item:active { color: #c05050; background: #fff0f0; }

  /* Add group */
  .add-container {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    padding: 14px;
  }

  .add-input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    border-radius: var(--r-sm);
    transition: border-color 0.2s;
  }
  .add-input::placeholder { color: var(--text-dim); }
  .add-input:focus { border-color: var(--text); }

  .add-submit-btn {
    background: var(--text);
    border: none;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 12px;
    cursor: pointer;
    border-radius: var(--r-sm);
    transition: opacity 0.2s;
  }
  .add-submit-btn:active { opacity: 0.75; }

  /* ─── BOTTOM BAR ─── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(245,244,240,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1.5px solid var(--border);
    padding: 14px 16px 20px;
    display: flex;
    gap: 10px;
    max-width: 480px;
    margin: 0 auto;
    z-index: 200;
  }

  .bar-btn {
    flex: 1;
    padding: 14px;
    border-radius: var(--r-full);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .bar-btn:active { transform: scale(0.97); }

  .bar-reset { background: var(--surface); color: var(--text-mid); border: 1.5px solid var(--border); }
  .bar-all-done { background: var(--text); color: #fff; border: none; font-weight: 600; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--text);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.3px;
    padding: 10px 20px;
    border-radius: var(--r-full);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 1000;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .complete-wrap {
    text-align: center;
    padding: 32px 20px;
    animation: fadeUp 0.5s ease;
  }
  .complete-wrap .complete-icon { font-size: 32px; margin-bottom: 8px; }
  .complete-wrap p { font-size: 13px; font-weight: 500; color: var(--text-mid); letter-spacing: 0.3px; }

  .empty-state {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-dim);
    font-size: 13px;
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: var(--r);
    margin-bottom: 10px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── TEMPLATE CARDS STRIP ─── */
  .templates-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .templates-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 6px;
    margin-bottom: 16px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .templates-scroll::-webkit-scrollbar { display: none; }

  .template-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    padding: 14px;
    min-width: 200px;
    max-width: 200px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .template-card-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.4px;
  }

  .template-textarea {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    padding: 10px 12px;
    resize: none;
    min-height: 72px;
    outline: none;
    transition: border-color 0.2s;
  }
  .template-textarea:focus { border-color: var(--text); }
  .template-textarea::placeholder { color: var(--text-dim); }

  .template-copy-btn {
    background: var(--bg);
    border: 1.5px solid var(--border);
    color: var(--text-mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 9px;
    border-radius: var(--r-sm);
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .template-copy-btn:active { opacity: 0.7; }
  .template-copy-btn.copied { background: #3a7d52; color: #fff; border-color: #3a7d52; }

  .ms-mode .group-actions { display: none; }
  .ms-mode .group-main { cursor: pointer; }

  /* Style สำหรับ Preview รูปที่เลือก */
  .preview-wrapper {
    position: relative; width: 60px; height: 60px;
    border-radius: 8px; overflow: hidden; border: 1.5px solid var(--border);
  }
  .preview-wrapper img { width: 100%; height: 100%; object-fit: cover; }
  .preview-remove {
    position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6);
    color: #fff; border: none; border-radius: 50%; width: 16px; height: 16px;
    font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">
      <span class="brand-sub">Watch Group</span>
      <span class="brand-title">Posting Board</span>
    </div>
    <button class="reset-btn" onclick="resetAll()">Reset All</button>
  </div>
  <div class="progress-section">
    <div class="progress-meta">
      <span class="label">Progress</span>
      <span class="count" id="progressText">0 / 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>
</div>

<div class="session-banner" id="sessionBanner">
  <div class="session-info">
    <div class="session-pulse"></div>
    <span id="sessionLabel">Session: 0 of 0 done</span>
  </div>
  <button class="session-stop-btn" onclick="stopSession()">Stop</button>
</div>

<div class="content">
  <div class="post-card">
    <div class="card-label">Caption</div>
    <textarea class="post-textarea" id="postText" placeholder="วางข้อความที่จะโพสต์ที่นี่..." oninput="saveData()"></textarea>
    <button class="copy-btn" id="copyBtn" onclick="copyText()">Copy Caption</button>
  </div>

  <div class="post-card" id="autoPosterCard">
    <div class="card-label">🤖 Auto-Poster</div>

    <button class="bulk-action-btn bulk-btn-wait" onclick="bulkSetStatus('waiting')">⏳ Waiting</button>
    <button class="bulk-action-btn bulk-btn-reset" onclick="bulkSetStatus('pending')">↺ Reset</button>
  </div>

  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab tab-all active" onclick="setFilter('all')">
      All <span class="tab-count" id="countAll">0</span>
    </button>
    <button class="filter-tab tab-approved" onclick="setFilter('done')">
      ✓ <span class="tab-count" id="countDone">0</span>
    </button>
    <button class="filter-tab tab-waiting" onclick="setFilter('waiting')">
      ⏳ <span class="tab-count" id="countWaiting">0</span>
    </button>
  </div>

  <div id="groupList"></div>

    <input class="add-input" id="addInputName" type="text" placeholder="ชื่อกลุ่มใหม่..." maxlength="80">

<div class="bottom-bar">
  <button class="bar-btn bar-reset" onclick="resetDone()">Reset Status</button>
  <button class="bar-btn bar-all-done" onclick="markAllDone()">Mark All Done</button>
</div>

<div class="toast" id="toast"></div>

<script>
const defaultGroups = [
  { id: 1, name: "ซื้อ-ขายแลกเปลี่ยนนาฬิกา R watch", note: "ห้ามใส่ลิ้งค์ ใส่ id @ supwatch แทน", link: "https://www.facebook.com/share/g/1Cxe1beqhf/" },
  { id: 2, name: "นาฬิกามือสอง โพสต์ขายฟรี", note: "", link: "https://www.facebook.com/share/g/1LM4n7tACt/" },
  { id: 3, name: "นาฬิกามือสอง ออนไลน์", note: "", link: "https://www.facebook.com/share/g/1BLdJnsk1t/" },
  { id: 4, name: "HRPT Watches Market Thailand", note: "", link: "https://www.facebook.com/share/g/1EMjs9g928/" },
  { id: 5, name: "HRPT Thailand Market Talks", note: "", link: "https://www.facebook.com/share/g/1L91xTVgTB/?mibextid=wwXIfr" },
  { id: 6, name: "ซื้อ-ขาย นาฬิกาเกรด Rep แบรนด์ทุกยี่ห้อ", note: "", link: "https://www.facebook.com/share/g/18pHWWZQYT/" },
  { id: 7, name: "นาฬิกา มือสองทุกรุ่น", note: "", link: "https://www.facebook.com/share/g/1C9JwAgCTD/" },
  { id: 8, name: "ขายนาฬิกามือ1และมือ2 ทุกแบรนไม่จำกัดราคา", note: "", link: "https://www.facebook.com/share/g/1FviQkkkbq/" },
  { id: 9, name: "กลุ่มซื้อ-ขาย นาฬิกามือสอง ทุกรุ่น", note: "", link: "https://www.facebook.com/share/g/1BUsYAiXop/" }
];

let groups = [];
let nextId = 100;
let currentFilter = 'all';
let sessionMode = false;
let multiSelectMode = false;
let selectedIds = new Set();
let selectedFiles = [];
let autoPostInterval = null;

// ─── DATA MANAGEMENT ───
function loadData() {
  try {
    const saved = localStorage.getItem('watchGroupsV4');
    const savedPost = localStorage.getItem('postText');
    const savedUrl = localStorage.getItem('serverUrl');
    
    if (saved) {
      const p = JSON.parse(saved);
      groups = p.groups || initGroups();
      nextId = p.nextId || 100;
    } else {
      groups = initGroups();
    }
    
    if (savedPost) document.getElementById('postText').value = savedPost;
    if (savedUrl) document.getElementById('serverUrl').value = savedUrl;
    
    // โหลดข้อความ Templates ด้วย
    ['headerText', 'groupChatText', 'lineText'].forEach(id => {
      const tpl = localStorage.getItem(id);
      if (tpl) document.getElementById(id).value = tpl;
    });
    
  } catch(e) { 
    groups = initGroups(); 
  }
}

function initGroups() {
  return defaultGroups.map(g => ({ ...g, status: 'pending' }));
}

function saveData() {
  localStorage.setItem('watchGroupsV4', JSON.stringify({ groups, nextId }));
  localStorage.setItem('postText', document.getElementById('postText').value);
}

function saveServerUrl() {
  localStorage.setItem('serverUrl', document.getElementById('serverUrl').value.trim());
}

function saveTpl() {
  ['headerText', 'groupChatText', 'lineText'].forEach(id => {
    localStorage.setItem(id, document.getElementById(id).value);
  });
}

// ─── FILTER & RENDER ───
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(btn => btn.classList.remove('active'));
  const map = { all: 'tab-all', done: 'tab-approved', waiting: 'tab-waiting' };
  document.querySelector('.' + map[f])?.classList.add('active');
  render();
}

function getVisible() {
  if (currentFilter === 'all') return groups;
  return groups.filter(g => g.status === currentFilter);
}

function render() {
  const visible = getVisible();
  const listDiv = document.getElementById('groupList');
  
  // อัปเดตตัวเลข Counts บน Filter Tabs
  document.getElementById('countAll').textContent = groups.length;
  document.getElementById('countDone').textContent = groups.filter(g => g.status === 'done').length;
  document.getElementById('countWaiting').textContent = groups.filter(g => g.status === 'waiting').length;

  // อัปเดต Progress Header
  const doneCount = groups.filter(g => g.status === 'done').length;
  document.getElementById('progressText').textContent = `${doneCount} / ${groups.length}`;
  const percent = groups.length > 0 ? (doneCount / groups.length) * 100 : 0;
  document.getElementById('progressBar').style.width = `${percent}%`;

  if (visible.length === 0) {
    listDiv.innerHTML = `<div class="empty-state">ไม่พบกลุ่มในหมวดหมู่นี้</div>`;
    return;
  }

  // หา ID ของกลุ่ม pending ลำดับแรกสุดเพื่อใช้ใน Session Mode
  let nextPendingId = null;
  if (sessionMode) {
    const nextG = groups.find(g => g.status === 'pending');
    if (nextG) nextPendingId = nextG.id;
  }

  listDiv.innerHTML = visible.map(g => {
    const isNext = g.id === nextPendingId;
    const isSelected = selectedIds.has(g.id);
    
    let itemClasses = `group-item status-${g.status}`;
    if (isNext) itemClasses += ' session-next';
    if (isSelected) itemClasses += ' ms-selected';

    return `
      <div class="${itemClasses}" data-id="${g.id}">
        <div class="group-main" onclick="handleGroupMainClick(${g.id})">
          <div class="ms-checkbox">${isSelected ? '✓' : ''}</div>
          <div class="status-dot"></div>
          <div class="group-info">
            <div class="group-name">${g.name}</div>
            ${g.note ? `<div class="group-note">💡 ${g.note}</div>` : ''}
          </div>
          <span class="session-badge">ถัดไป</span>
          <span class="group-badge">${g.status === 'done' ? 'Posted' : g.status === 'waiting' ? 'Waiting' : 'Pending'}</span>
        </div>
        <div class="group-actions">
          <button class="group-action-btn btn-post-mark" onclick="launchLink(${g.id})">เปิดกลุ่ม ↗</button>
          <button class="group-action-btn btn-wait ${g.status==='waiting'?'active-wait':''}" onclick="setStatus(${g.id}, 'waiting')">⏳ รออนุมัติ</button>
          <button class="group-action-btn btn-delete-item" onclick="deleteGroup(${g.id})">ลบ</button>
        </div>
      </div>
    `;
  }).join('');
}

// ─── INTERACTIONS ───
function handleGroupMainClick(id) {
  if (multiSelectMode) {
    toggleSelect(id);
    return;
  }
  const g = groups.find(x => x.id === id);
  if (!g) return;
  g.status = (g.status === 'done') ? 'pending' : 'done';
  saveData(); render();
  showToast(g.status === 'done' ? 'Marked as Posted ✓' : 'Reset to Pending');
}

function launchLink(id) {
  const g = groups.find(x => x.id === id);
  if (!g) return;
  const text = document.getElementById('postText').value;
  if (text.trim()) {
    navigator.clipboard.writeText(text).catch(() => {});
    showToast('คัดลอกข้อความและกำลังเปิดกลุ่ม ↗');
  } else {
    showToast('กำลังเปิดกลุ่ม ↗');
  }
  if (g.status === 'pending') g.status = 'waiting';
  saveData(); render();
  
  if (sessionMode) setTimeout(scrollToNextPending, 400);

  if (g.link) window.open(g.link, '_blank');
  else showToast('กลุ่มนี้ไม่มีลิ้งค์');
}

function setStatus(id, status) {
  const g = groups.find(x => x.id === id);
  if (!g) return;
  g.status = (g.status === status) ? 'pending' : status;
  saveData(); render();
  if (g.status === 'done') showToast('Posted ✓');
  else if (g.status === 'waiting') showToast('Waiting for Approval');
  
  if (sessionMode) scrollToNextPending();
}

// ─── IMAGE UPLOAD HANDLING ───
function handleImages(e) {
  const files = Array.from(e.target.files);
  selectedFiles = [...selectedFiles, ...files];
  renderImagePreviews();
}

function renderImagePreviews() {
  const container = document.getElementById('imagePreviews');
  container.innerHTML = '';
  selectedFiles.forEach((file, index) => {
    const url = URL.createObjectURL(file);
    container.innerHTML += `
      <div class="preview-wrapper">
        <img src="${url}">
        <button class="preview-remove" onclick="removeImage(${index})">✕</button>
      </div>
    `;
  });
}

function removeImage(index) {
  selectedFiles.splice(index, 1);
  renderImagePreviews();
}

// ─── AUTOMATIC POSTER (RAILWAY CONNECT) ───
async function checkServer() {
  const url = document.getElementById('serverUrl').value.trim();
  if (!url) { showToast('โปรดระบุ URL ของเซิร์ฟเวอร์'); return; }
  const statusDiv = document.getElementById('serverStatus');
  statusDiv.textContent = '🔄 Pinging...';
  
  try {
    const res = await fetch(`${url}/status`);
    const data = await res.json();
    if (data.online) {
      statusDiv.innerHTML = `🟢 Online ${data.running ? '(กำลังโพสต์ทำงานอยู่)' : '(พร้อมใช้งาน)'}`;
      showToast('เชื่อมต่อเซิร์ฟเวอร์สำเร็จ');
    }
  } catch (e) {
    statusDiv.textContent = '🔴 Offline (ไม่สามารถติดต่อเซิร์ฟเวอร์ได้)';
    showToast('เชื่อมต่อล้มเหลว');
  }
}

async function startAutoPost() {
  const url = document.getElementById('serverUrl').value.trim();
  const caption = document.getElementById('postText').value;
  
  if (!url) { showToast('โปรดใส่ PC Server URL!'); return; }
  const targetGroups = groups.filter(g => g.status === 'pending');
  if (targetGroups.length === 0) { showToast('ไม่มีกลุ่มเหลือในคิว Pending!'); return; }

  const formData = new FormData();
  formData.append('caption', caption);
  formData.append('groups', JSON.stringify(targetGroups));
  selectedFiles.forEach(file => formData.append('images', file));

  showToast('🚀 กำลังเริ่มระบบสั่งโพสต์อัตโนมัติ...');
  document.getElementById('autoPostBtn').style.display = 'none';
  document.getElementById('autoStopBtn').style.display = 'block';
  document.getElementById('autoProgress').style.display = 'block';

  try {
    const res = await fetch(`${url}/start-poster`, { method: 'POST', body: formData });
    const data = await res.json();
    if (data.ok) {
      startSyncingProgress(url);
    } else {
      showToast('❌ เกิดข้อผิดพลาด: ' + data.error);
      resetAutoPostUi();
    }
  } catch (e) {
    showToast('❌ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ Railway ได้');
    resetAutoPostUi();
  }
}

function startSyncingProgress(serverUrl) {
  if (autoPostInterval) clearInterval(autoPostInterval);
  
  autoPostInterval = setInterval(async () => {
    try {
      const res = await fetch(`${serverUrl}/status`);
      const data = await res.json();
      
      if (!data.online) return;
      
      const session = data.session || { done: 0, total: 0, groups: [] };
      const done = session.done || 0;
      const total = session.total || 0;
      const p = total > 0 ? (done / total) * 100 : 0;
      
      document.getElementById('autoProgressBar').style.width = `${p}%`;
      document.getElementById('autoProgressText').textContent = `กำลังโพสต์... สำเร็จแล้ว ${done} / ${total} กลุ่ม`;

      if (session.groups) {
        document.getElementById('autoGroupList').innerHTML = session.groups.map(g => {
          const icons = { done: '✅', failed: '❌', pending: '⏳' };
          return `<div style="font-size:12px; display:flex; gap:6px;"><span>${icons[g.status]||'⏳'}</span><span>${g.name}</span></div>`;
        }).join('');

        // Sync สถานะความคืบหน้ากลับมาสู่เครื่องมือถือโลคอลด้วย
        session.groups.forEach(serverGroup => {
          if (serverGroup.status === 'done') {
            const local = groups.find(g => g.id === serverGroup.id);
            if (local && local.status !== 'done') {
              local.status = 'done';
            }
          }
        });
        saveData(); render();
      }

      if (done >= total || !data.running) {
        clearInterval(autoPostInterval);
        document.getElementById('autoProgressText').textContent = `🎉 โพสต์อัตโนมัติเสร็จสิ้นครบทั้งหมดเรียบร้อย!`;
        resetAutoPostUi();
      }
    } catch (e) { console.error('Progress sync err:', e); }
  }, 2000);
}

async function stopAutoPost() {
  const url = document.getElementById('serverUrl').value.trim();
  if (!url) return;
  try {
    await fetch(`${url}/stop-poster`, { method: 'POST' });
    showToast('🛑 สั่งหยุดโพสต์เรียบร้อย');
    clearInterval(autoPostInterval);
    resetAutoPostUi();
  } catch(e) { showToast('ไม่สามารถส่งคำสั่งหยุดได้'); }
}

function resetAutoPostUi() {
  document.getElementById('autoPostBtn').style.display = 'block';
  document.getElementById('autoStopBtn').style.display = 'none';
}

// ─── SESSION HANDLERS ───
function toggleSession() {
  sessionMode = !sessionMode;
  const btn = document.getElementById('sessionBtn');
  const banner = document.getElementById('sessionBanner');
  
  btn.classList.toggle('session-active', sessionMode);
  btn.textContent = sessionMode ? '🛑 Stop Session' : '▶ Start Session';
  banner.classList.toggle('active', sessionMode);
  
  if (sessionMode) {
    updateSessionBanner();
    scrollToNextPending();
  } else {
    render();
  }
}

function updateSessionBanner() {
  const totalPending = groups.filter(g => g.status === 'pending').length;
  document.getElementById('sessionLabel').textContent = `เหลือกลุ่มรอโพสต์ในเซสชั่นนี้อีก: ${totalPending} กลุ่ม`;
}

function stopSession() {
  if (sessionMode) toggleSession();
}

function scrollToNextPending() {
  updateSessionBanner();
  setTimeout(() => {
    const nextEl = document.querySelector('.group-item.session-next');
    if (nextEl) {
      nextEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else if (sessionMode) {
      showToast('🎉 เคลียร์เซสชั่นครบทุกกลุ่มแล้วครับ!');
      toggleSession();
    }
  }, 100);
}

// ─── MULTI-SELECT BULK ACTIONS ───
function toggleMultiSelect() {
  multiSelectMode = !multiSelectMode;
  selectedIds.clear();
  const btn = document.getElementById('msBtn');
  btn.classList.toggle('ms-active', multiSelectMode);
  btn.textContent = multiSelectMode ? '✕ Cancel' : '☑ Select';
  document.getElementById('groupList').classList.toggle('ms-mode', multiSelectMode);
  document.getElementById('bulkBar').classList.toggle('visible', multiSelectMode);
  updateBulkCount();
  render();
}

function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  updateBulkCount();
}

function bulkSelectAll() {
  const visible = getVisible();
  const allSelected = visible.every(g => selectedIds.has(g.id));
  if (allSelected) visible.forEach(g => selectedIds.delete(g.id));
  else visible.forEach(g => selectedIds.add(g.id));
  updateBulkCount();
  render();
}

function updateBulkCount() {
  document.getElementById('bulkCount').textContent = selectedIds.size === 0 ? 'เลือกกลุ่มที่ต้องการ' : `เลือกแล้ว ${selectedIds.size} กลุ่ม`;
}

function bulkSetStatus(status) {
  if (selectedIds.size === 0) { showToast('กรุณาเลือกกลุ่มก่อนครับ'); return; }
  groups.forEach(g => { if (selectedIds.has(g.id)) g.status = status; });
  selectedIds.clear();
  saveData(); toggleMultiSelect(); render();
  showToast('อัปเดตสถานะกลุ่มทั้งหมดเรียบร้อย');
}

// ─── UTILITIES & CRUD ───
function addGroup() {
  const nameInput = document.getElementById('addInputName');
  const linkInput = document.getElementById('addInputLink');
  const name = nameInput.value.trim();
  const link = linkInput.value.trim();

  if (!name) { showToast('โปรดใส่ชื่อกลุ่ม!'); return; }
  
  groups.push({ id: nextId++, name, note: '', link, status: 'pending' });
  nameInput.value = ''; linkInput.value = '';
  saveData(); render();
  showToast('เพิ่มกลุ่มใหม่สำเร็จ ➕');
}

function deleteGroup(id) {
  if(confirm('คุณต้องการลบกลุ่มนี้ใช่หรือไม่?')) {
    groups = groups.filter(g => g.id !== id);
    saveData(); render();
    showToast('ลบกลุ่มเรียบร้อย');
  }
}

function resetDone() {
  groups.forEach(g => { if (g.status === 'done') g.status = 'pending'; });
  saveData(); render(); showToast('รีเซ็ตกลุ่มที่สำเร็จเป็น Pending');
}

function markAllDone() {
  groups.forEach(g => g.status = 'done');
  saveData(); render(); showToast('เปลี่ยนทุกกลุ่มเป็น Posted ✓');
}

function resetAll() {
  if (confirm('คุณต้องการรีเซ็ตข้อมูลกลุ่มและสเตตัสทั้งหมดกลับเป็นค่าเริ่มต้นใช่ไหม?')) {
    localStorage.removeItem('watchGroupsV4');
    groups = initGroups();
    saveData(); render();
    showToast('รีเซ็ตข้อมูลเริ่มต้นเรียบร้อย');
  }
}

function copyText() {
  const txt = document.getElementById('postText');
  if (!txt.value.trim()) { showToast('ไม่มีข้อความให้คัดลอก'); return; }
  txt.select(); txt.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(txt.value).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied! ✓'; btn.classList.add('copied');
    showToast('คัดลอกคำบรรยาย (Caption) เรียบร้อย');
    setTimeout(() => { btn.textContent = 'Copy Caption'; btn.classList.remove('copied'); }, 1500);
  });
}

function copyTpl(id, btn) {
  const val = document.getElementById(id).value;
  if (!val.trim()) { showToast('เทมเพลตนี้ไม่มีข้อความ'); return; }
  navigator.clipboard.writeText(val).then(() => {
    const oldText = btn.textContent;
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    showToast('คัดลอกเทมเพลตเรียบร้อย');
    setTimeout(() => { btn.textContent = oldText; btn.classList.remove('copied'); }, 1500);
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg; toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// INITIAL LOAD
window.onload = () => {
  loadData();
  render();
};
</script>
</body>
